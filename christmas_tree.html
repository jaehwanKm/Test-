<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO_CONSTRUCT_V6.2</title>
    <!-- Import Google Font for Cyberpunk look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        /* --- DESIGN SYSTEM V6.2 --- */
        :root {
            --primary: #00FF41;
            --primary-dim: rgba(0, 255, 65, 0.05);
            --secondary: #008F11;
            --accent: #FFFFFF;
            --alert: #FF0033; /* Cyber Red */
            --ui-bg: linear-gradient(180deg, rgba(0, 0, 0, 0) 0%, rgba(0, 10, 0, 0.8) 100%);
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Share Tech Mono', monospace;
            color: var(--primary);
            user-select: none;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* --- HUD LAYER --- */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            background: radial-gradient(circle at center, transparent 50%, rgba(0,0,0,0.8) 120%);
            padding: 40px;
        }

        /* Subtle CRT Lines */
        #ui-layer::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.15),
                rgba(0, 0, 0, 0.15) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: -1;
        }

        /* TOP HUD */
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--primary-dim);
            padding-top: 10px;
        }

        .title-block h1 {
            margin: 0;
            font-size: 20px;
            letter-spacing: 4px;
            font-weight: normal;
            text-transform: uppercase;
            text-shadow: 0 0 8px var(--primary);
        }

        .title-block .sub {
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 2px;
        }

        .metrics {
            text-align: right;
            font-size: 12px;
            line-height: 1.5;
            color: rgba(0, 255, 65, 0.7);
        }

        /* BOTTOM HUD */
        .footer-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .terminal-container {
            width: 350px;
        }

        .terminal-header {
            font-size: 10px;
            color: #fff;
            background: var(--primary);
            color: #000;
            padding: 2px 5px;
            display: inline-block;
            margin-bottom: 5px;
        }

        .terminal-log {
            height: 100px;
            font-size: 11px;
            color: var(--primary);
            opacity: 0.9;
            mask-image: linear-gradient(to bottom, transparent, black 10%);
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 10%);
            display: flex;
            flex-direction: column-reverse;
            text-shadow: 0 0 2px var(--secondary);
        }

        .log-entry { margin-top: 2px; }
        .log-entry::before { content: ">> "; color: #fff; opacity: 0.5; }

        /* PROGRESS BAR */
        .progress-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            text-align: center;
        }
        
        .progress-label {
            font-size: 10px;
            margin-bottom: 5px;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        .progress-track {
            height: 2px;
            background: rgba(0, 255, 65, 0.2);
            width: 100%;
            position: relative;
        }

        .progress-fill {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            background: var(--primary);
            width: 0%;
            box-shadow: 0 0 10px var(--primary);
            transition: width 0.1s linear;
        }

        /* CONTROLS */
        .controls {
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }

        button {
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 8px 16px;
            font-family: inherit;
            font-size: 11px;
            letter-spacing: 1px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            backdrop-filter: blur(4px);
        }

        button:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 15px var(--primary);
        }

        /* LOADING */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--primary);
            letter-spacing: 5px;
            font-size: 12px;
            transition: opacity 1s;
        }

        /* POP LABEL ANIMATION */
        @keyframes cyberPop {
            0% { 
                opacity: 0; 
                transform: translate(-50%, -50%) scale(0.5); 
                filter: blur(20px);
            }
            60% { 
                opacity: 1; 
                transform: translate(-50%, -50%) scale(1.1); 
                filter: blur(0px);
            }
            100% { 
                opacity: 1; 
                transform: translate(-50%, -50%) scale(1.0); 
            }
        }

        #object-label {
            position: absolute;
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            
            font-size: 80px; /* Massive Impact */
            color: #FFFFFF; /* White hot core */
            
            /* Multi-layered Neon Bloom */
            text-shadow: 
                0 0 10px #FFFFFF,
                0 0 20px var(--alert), 
                0 0 40px var(--alert), 
                0 0 80px var(--alert),
                0 0 120px #FF0000;
                
            letter-spacing: 12px;
            pointer-events: none;
            text-align: center;
            width: 100%;
            font-weight: bold;
            opacity: 0;
            white-space: nowrap;
            z-index: 50;
            mix-blend-mode: screen; /* Cinematic blending */
        }

        #object-label.visible {
            animation: cyberPop 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

    </style>
</head>
<body>

    <div id="loader">INITIALIZING CONSTRUCT...</div>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <!-- Top Info -->
        <div class="header-row">
            <div class="title-block">
                <h1>Matrix.Mas</h1>
                <div class="sub">HOLOGRAM_PROJECTOR_V6.2</div>
            </div>
            <div class="metrics">
                <div>SYS: ONLINE</div>
                <div>FPS: <span id="fps">60</span></div>
                <div>BUILD_TIME: 9.0s</div>
            </div>
        </div>

        <div id="object-label">MERRY CHRISTMAS!</div>

        <!-- Center Progress -->
        <div class="progress-container">
            <div class="progress-label">COMPILATION PROGRESS</div>
            <div class="progress-track">
                <div class="progress-fill" id="build-bar"></div>
            </div>
        </div>

        <!-- Bottom Info -->
        <div class="footer-row">
            <div class="terminal-container">
                <div class="terminal-header">SYSTEM_LOG</div>
                <div class="terminal-log" id="term-log">
                    <div class="log-entry">Waiting for input...</div>
                </div>
            </div>

            <div class="controls">
                <button onclick="restart()">Recompile</button>
                <button onclick="toggleCam()">Orbit</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const CONFIG = {
            treeHeight: 60,
            treeRadius: 22,
            particleCount: 15000, 
            rainCount: 2500,
            buildDuration: 9.0, // EXACTLY 9 seconds
        };

        // --- SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000200); // Deep black-green
        scene.fog = new THREE.FogExp2(0x000200, 0.012);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 500);
        camera.position.set(0, 15, 100);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // --- ASSETS ---
        function createAtlas() {
            const size = 1024;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = 'rgba(0,0,0,0)';
            ctx.fillRect(0,0,size,size);
            
            const cols = 16;
            const rows = 16;
            const charSize = size/cols;
            
            // Using system monospace fallback ensures crispness if webfont fails load
            ctx.font = 'bold ' + (charSize*0.75) + 'px "Share Tech Mono", monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#FFFFFF';
            
            const chars = "ﾊﾐﾋｰｳｼﾅﾓﾆｻﾜﾂｵﾘｱﾎﾃﾏｹﾒｴｶｷﾑﾕﾗｾﾈｽﾀﾇﾍ012345789<>:|+=";

            for(let i=0; i<256; i++) {
                const char = chars[i % chars.length];
                const x = (i%cols)*charSize + charSize/2;
                const y = Math.floor(i/cols)*charSize + charSize/2;
                ctx.fillText(char, x, y);
            }
            return new THREE.CanvasTexture(canvas);
        }
        const tex = createAtlas();
        tex.magFilter = THREE.LinearFilter;
        tex.minFilter = THREE.LinearMipMapLinearFilter;

        // --- SHADERS ---
        const vertexShader = `
            attribute float size;
            attribute float charIndex;
            attribute vec3 customColor;
            attribute float alphaOffset; // Random 0-1
            
            varying float vIndex;
            varying vec3 vColor;
            varying float vAlpha;
            
            uniform float uTime;
            uniform float uBuildHeight; // 0 to TreeHeight
            uniform float uIsRain;
            
            void main() {
                vIndex = charIndex;
                vColor = customColor;
                vec3 pos = position;
                vAlpha = 1.0;
                if(uIsRain > 0.5) {
                    float speed = 15.0;
                    // Rain falls
                    float fall = mod(uTime * speed + alphaOffset * 200.0, 200.0);
                    pos.y = 100.0 - fall;
                    // Fade near bottom
                    if(pos.y < -50.0) vAlpha = 0.0;
                } else {
                    // Tree Logic
                    float startY = -30.0; // Tree base
                    float visibleY = startY + uBuildHeight;
                    
                    if(pos.y > visibleY) {
                        vAlpha = 0.0;
                    } else {
                        // "Scanner" effect at the build line
                        float dist = visibleY - pos.y;
                        if(dist < 2.0) {
                            vColor += vec3(0.5, 0.5, 0.5); // Highlight
                            // Glitch scale
                            pos *= 1.02; 
                        }
                    }
                }
                vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                gl_PointSize = size * (500.0 / -mvPosition.z);
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const fragmentShader = `
            uniform sampler2D uTex;
            varying float vIndex;
            varying vec3 vColor;
            varying float vAlpha;
            uniform float uTime;
            
            void main() {
                if (vAlpha <= 0.01) discard;
                
                // Atlas lookup
                float cols = 16.0;
                // Animate characters
                float animSpeed = 8.0;
                float frame = floor(uTime * animSpeed + vIndex);
                float idx = mod(frame, 256.0);
                
                vec2 uv = gl_PointCoord / cols;
                uv.x += mod(idx, cols) / cols;
                uv.y += (15.0 - floor(idx/cols)) / cols; // Flip Y for texture coords
                
                vec4 texColor = texture2D(uTex, uv);
                if(texColor.a < 0.5) discard;
                
                gl_FragColor = vec4(vColor, vAlpha);
            }
        `;

        // --- GEOMETRY ---
        function createSystem(count, isRain) {
            const geo = new THREE.BufferGeometry();
            const pos=[], col=[], sz=[], idx=[], off=[];
            
            for(let i=0; i<count; i++) {
                if(isRain) {
                    pos.push((Math.random()-0.5)*200, 0, (Math.random()-0.5)*150);
                    col.push(0, 0.4, 0);
                    sz.push(3.0);
                } else {
                    // Tree Volume
                    const h = Math.random() * CONFIG.treeHeight;
                    const progress = h / CONFIG.treeHeight;
                    const r = CONFIG.treeRadius * (1.0 - progress);
                    
                    const angle = Math.random() * Math.PI * 2;
                    const rad = Math.sqrt(Math.random()) * r;
                    
                    const x = Math.cos(angle)*rad;
                    const z = Math.sin(angle)*rad;
                    const y = h - 30; // Centered vertically roughly
                    
                    pos.push(x, y, z);
                    
                    // Color Logic
                    // Modified: Stricter edge condition and reduced probability for red ornaments
                    const isEdge = rad > r * 0.85; 
                    if(isEdge && Math.random() < 0.08) { // Reduced to 8% chance
                        // Red Ornament
                        col.push(1.0, 0.1, 0.1); // Brighter red
                        sz.push(6.0); // Slightly bigger
                    } else {
                        // Matrix Green Gradient
                        const br = 0.2 + Math.random()*0.8;
                        col.push(0.0, br, 0.1);
                        sz.push(2.5);
                    }
                }
                idx.push(Math.random()*256);
                off.push(Math.random());
            }
            
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
            geo.setAttribute('customColor', new THREE.Float32BufferAttribute(col,3));
            geo.setAttribute('size', new THREE.Float32BufferAttribute(sz,1));
            geo.setAttribute('charIndex', new THREE.Float32BufferAttribute(idx,1));
            geo.setAttribute('alphaOffset', new THREE.Float32BufferAttribute(off,1));
            
            const mat = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 },
                    uTex: { value: tex },
                    uBuildHeight: { value: 0 },
                    uIsRain: { value: isRain ? 1.0 : 0.0 }
                },
                vertexShader, fragmentShader,
                transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
            });
            
            const mesh = new THREE.Points(geo, mat);
            scene.add(mesh);
            return mesh;
        }

        const treeSys = createSystem(CONFIG.particleCount, false);
        const rainSys = createSystem(CONFIG.rainCount, true);

        // --- STAR SYSTEM ---
        function createStarTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            // Clear
            ctx.clearRect(0,0,128,128);

            // 1. Core Star Shape (Sharper)
            ctx.beginPath();
            const cx = 64, cy = 64, spikes = 5, outerRadius = 45, innerRadius = 18; // Tighter inner radius for sharpness
            let rot = Math.PI / 2 * 3;
            let x = cx, y = cy;
            let step = Math.PI / spikes;

            ctx.moveTo(cx, cy - outerRadius);
            for(let i=0; i<spikes; i++){
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;

                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();

            // 2. Pure White Fill with intense bloom
            ctx.fillStyle = "#FFFFFF";
            ctx.shadowColor = "rgba(255, 255, 255, 1.0)";
            ctx.shadowBlur = 20; 
            ctx.fill();
            
            // 3. Extra center punch
            ctx.beginPath();
            ctx.arc(64, 64, 10, 0, Math.PI*2);
            ctx.fillStyle = "#FFFFFF";
            ctx.fill();

            return new THREE.CanvasTexture(canvas);
        }

        const starMat = new THREE.SpriteMaterial({ 
            map: createStarTexture(),
            color: 0xFFFFFF,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            fog: false // <--- CRITICAL FIX: Ignores fog to stay bright white
        });
        
        const starSprite = new THREE.Sprite(starMat);
        // Position at top of tree (Tree apex is at y = 30)
        starSprite.position.set(0, 30, 0); 
        starSprite.scale.set(0, 0, 0); // Start hidden
        scene.add(starSprite);


        // --- ANIMATION CONTROL ---
        let startTime = null;
        let isOrbiting = true;
        let isBuilt = false;

        // UI Logger
        const termLog = document.getElementById('term-log');
        function log(msg) {
            const div = document.createElement('div');
            div.className = 'log-line';
            div.innerText = `> ${msg}`;
            termLog.prepend(div);
        }

        // Start
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = 0;
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    restart();
                }, 1000);
            }, 1000);
        };

        window.restart = function() {
            startTime = Date.now();
            isBuilt = false;
            
            // Reset Star
            starSprite.visible = false;
            starSprite.scale.set(0, 0, 0);

            log("System rebooted.");
            log("Compiling voxel tree...");
            document.getElementById('object-label').classList.remove('visible');
        };
        
        window.toggleCam = function() {
            isOrbiting = !isOrbiting;
            log(isOrbiting ? "Camera: ORBIT" : "Camera: STATIC");
        };

        function animate() {
            requestAnimationFrame(animate);
            if(!startTime) return;

            const now = Date.now();
            const elapsed = (now - startTime) / 1000; // Seconds

            // Update Shader Time
            treeSys.material.uniforms.uTime.value = elapsed;
            rainSys.material.uniforms.uTime.value = elapsed;

            // Build Logic (9 Seconds)
            let progress = elapsed / CONFIG.buildDuration;
            if(progress > 1.0) progress = 1.0;
            
            // Map progress 0..1 to height 0..CONFIG.treeHeight
            const currentHeight = progress * (CONFIG.treeHeight + 10); // +10 to ensure full cover
            treeSys.material.uniforms.uBuildHeight.value = currentHeight;

            // Update UI Progress Bar
            document.getElementById('build-bar').style.width = (progress * 100) + "%";

            // Completion Event
            if(progress >= 1.0 && !isBuilt) {
                isBuilt = true;
                starSprite.visible = true; // Show star
                log("Construction Complete.");
                log("Merry Christmas.");
                document.getElementById('object-label').classList.add('visible');
            }

            // Star Pulse Animation
            if(isBuilt) {
                // Reduced size: Pulse between 8 and 10 (was 12-16)
                const pulse = 9 + Math.sin(elapsed * 4) * 1.5;
                starSprite.scale.set(pulse, pulse, 1);
            }

            // Camera Orbit
            if(isOrbiting) {
                const r = 90;
                const speed = 0.1;
                camera.position.x = Math.sin(elapsed * speed) * r;
                camera.position.z = Math.cos(elapsed * speed) * r;
                camera.lookAt(0, 0, 0);
            }

            // FPS Mock
            if(Math.random() > 0.95) document.getElementById('fps').innerText = Math.floor(59 + Math.random()*2);
            
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();

    </script>
</body>
</html>
